<svg viewBox="0 0 300 370" xmlns="http://www.w3.org/2000/svg">
  <title>Le Club des Voyageurs — Logo complet fond sombre</title>
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:ital,wght@0,300;1,300&display=swap');
    ]]></style>
    <clipPath id="cap-fd">
      <ellipse cx="100" cy="78" rx="19" ry="27"/>
    </clipPath>
  </defs>

  <!-- Fond navy -->
  <rect width="300" height="370" fill="#1B2A4A"/>

  <!-- ===== ICÔNE (scale 0.75×, centrée) ===== -->
  <g transform="translate(75,12) scale(0.75)">
    <circle cx="100" cy="100" r="95" fill="#1B2A4A"/>
    <circle cx="100" cy="100" r="92" fill="none" stroke="#5BBCB8" stroke-width="0.7" opacity="0.2"/>

    <!-- Anneau supérieur turquoise -->
    <rect x="85" y="46" width="30" height="8" rx="4" fill="#5BBCB8"/>

    <!-- Capsule (crème) -->
    <ellipse cx="100" cy="78" rx="19" ry="27" fill="#F2F0E8"/>

    <!-- Grille -->
    <g clip-path="url(#cap-fd)" opacity="0.42">
      <line x1="76" y1="54" x2="124" y2="54" stroke="#7A7060" stroke-width="0.75"/>
      <line x1="76" y1="59" x2="124" y2="59" stroke="#7A7060" stroke-width="0.75"/>
      <line x1="76" y1="64" x2="124" y2="64" stroke="#7A7060" stroke-width="0.75"/>
      <line x1="76" y1="69" x2="124" y2="69" stroke="#7A7060" stroke-width="0.75"/>
      <line x1="76" y1="74" x2="124" y2="74" stroke="#7A7060" stroke-width="0.75"/>
      <line x1="76" y1="79" x2="124" y2="79" stroke="#7A7060" stroke-width="0.75"/>
      <line x1="76" y1="84" x2="124" y2="84" stroke="#7A7060" stroke-width="0.75"/>
      <line x1="76" y1="89" x2="124" y2="89" stroke="#7A7060" stroke-width="0.75"/>
      <line x1="76" y1="94" x2="124" y2="94" stroke="#7A7060" stroke-width="0.75"/>
      <line x1="76" y1="99" x2="124" y2="99" stroke="#7A7060" stroke-width="0.75"/>
      <line x1="87"  y1="51" x2="87"  y2="105" stroke="#7A7060" stroke-width="0.75"/>
      <line x1="95"  y1="51" x2="95"  y2="105" stroke="#7A7060" stroke-width="0.75"/>
      <line x1="103" y1="51" x2="103" y2="105" stroke="#7A7060" stroke-width="0.75"/>
      <line x1="111" y1="51" x2="111" y2="105" stroke="#7A7060" stroke-width="0.75"/>
    </g>

    <ellipse cx="100" cy="78" rx="19" ry="27" fill="none" stroke="#C8C4B8" stroke-width="0.8"/>

    <!-- Point gold -->
    <circle cx="100" cy="78" r="5" fill="#F5E08A"/>
    <circle cx="98.7" cy="76.7" r="1.8" fill="rgba(255,255,230,0.55)"/>

    <!-- Anneau inférieur turquoise -->
    <rect x="85" y="101" width="30" height="8" rx="4" fill="#5BBCB8"/>

    <!-- Col -->
    <rect x="93" y="110" width="14" height="6" rx="3" fill="#C8C4B4"/>
    <!-- Poignée -->
    <rect x="94" y="116" width="12" height="22" rx="5" fill="#F2F0E8"/>
    <rect x="92" y="124" width="16" height="3" rx="1.5" fill="#5BBCB8" opacity="0.5"/>
    <!-- Socle -->
    <rect x="88" y="139" width="24" height="5" rx="2.5" fill="#C8C4B4"/>

    <!-- Vague horizon -->
    <path d="M 36 163 C 52 156 68 170 84 163 C 100 156 117 171 133 163 C 149 155 163 166 165 163"
          fill="none" stroke="#5BBCB8" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- ===== TYPOGRAPHIE ===== -->

  <!-- LE -->
  <text x="150" y="186"
        font-family="'Jost', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="300" font-size="12"
        fill="#F2F0E8" fill-opacity="0.45"
        text-anchor="middle" letter-spacing="6">LE</text>

  <!-- CLUB -->
  <text x="150" y="244"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="72"
        fill="#F2F0E8"
        text-anchor="middle" letter-spacing="5">CLUB</text>

  <!-- DES -->
  <text x="150" y="266"
        font-family="'Jost', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="300" font-size="12"
        fill="#F2F0E8" fill-opacity="0.45"
        text-anchor="middle" letter-spacing="6">DES</text>

  <!-- VOYAGEURS -->
  <text x="150" y="306"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-weight="400" font-size="36"
        fill="#F2F0E8"
        text-anchor="middle" letter-spacing="4">VOYAGEURS</text>

  <!-- Séparateur -->
  <line x1="110" y1="320" x2="190" y2="320" stroke="#5BBCB8" stroke-width="0.8" opacity="0.6"/>

  <!-- Tagline -->
  <text x="150" y="342"
        font-family="'Jost', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="300" font-size="12" font-style="italic"
        fill="#C8896A"
        text-anchor="middle" letter-spacing="1.5">Partir, revenir, raconter</text>
</svg>
